<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- 未配置状态 -->
  <div id="page-setup" style="display:none">
    <h1>WordWin</h1>
    <p class="tagline">不翻译整篇文章，只翻译你不会的词</p>
    <p class="setup-hint">请先完成 API 配置</p>
    <button id="btn-go-settings" class="btn-primary">前往设置</button>
  </div>

  <!-- 正常使用状态 -->
  <div id="page-main" style="display:none">
    <div class="header">
      <h1>WordWin</h1>
    </div>

    <button id="btn-toggle" class="btn-toggle">翻译当前页</button>
    <div id="status-card" class="status-card" hidden>
      <div id="status-title" class="status-title">当前页状态</div>
      <div id="status-text" class="status-text"></div>
    </div>
    <div id="toast" class="toast"></div>
    <p class="popup-hint">只翻译当前页面；切换标签页后仍会继续完成，不会自动翻译其他页面。</p>

    <button id="btn-settings" class="btn-icon" title="设置">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
